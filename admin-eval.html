<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>客服生成评估码 - 湘泰出海</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root{--primary:#1b63f0;--primary-dark:#0d47a1;--accent:#ff8a00;--bg:#f0f4f8;--text:#1a1a2e;--muted:#5c6b7a;--border:#c5d3e0;--radius:12px;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:0 20px 40px;}
    .header{max-width:560px;margin:0 auto;padding:20px 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
    .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px;color:var(--text);}
    .brand a{color:var(--primary);text-decoration:none;}
    .brand a:hover{text-decoration:underline;}
    .box{max-width:480px;margin:0 auto;background:#fff;border-radius:14px;padding:28px 32px;box-shadow:0 4px 20px rgba(0,0,0,0.08);border:1px solid rgba(0,0,0,0.04);}
    h1{font-size:20px;margin-bottom:8px;color:var(--text);}
    .sub{font-size:13px;color:var(--muted);margin-bottom:20px;}
    .field{margin-bottom:16px;}
    label{display:block;font-size:14px;font-weight:600;margin-bottom:8px;color:var(--text);}
    input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;}
    input:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 3px rgba(27,99,240,0.12);}
    .row{display:flex;gap:12px;align-items:center;}
    .row .field{flex:1;margin-bottom:0;}
    button{padding:12px 20px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;}
    button:hover{opacity:0.95;}
    button:disabled{opacity:0.6;cursor:not-allowed;}
    .btn-block{width:100%;padding:14px;margin-top:8px;}
    .btn-copy{background:linear-gradient(135deg,var(--accent),#e65100);font-size:14px;padding:10px 16px;}
    .out-wrap{margin-top:20px;padding:18px;background:linear-gradient(135deg,rgba(27,99,240,0.08),rgba(255,138,0,0.06));border-radius:var(--radius);border:1px solid rgba(27,99,240,0.15);display:none;}
    .out-wrap.show{display:block;}
    .out-code{font-size:20px;font-weight:700;color:var(--primary);letter-spacing:2px;word-break:break-all;margin-bottom:12px;}
    .out-actions{display:flex;gap:10px;flex-wrap:wrap;}
    .err{color:#c62828;font-size:13px;margin-top:8px;display:none;}
    .err.show{display:block;}
    .hint{font-size:12px;color:var(--muted);margin-top:16px;line-height:1.6;}
    .config-toggle{font-size:13px;color:var(--primary);cursor:pointer;}
    .config-toggle:hover{text-decoration:underline;}
    .config-box{background:#f8fafc;border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:20px;display:none;}
    .config-box.show{display:block;}
    .config-box .field{margin-bottom:12px;}
    .config-box .hint{margin-top:12px;}
    .recent{margin-top:24px;padding-top:24px;border-top:1px solid var(--border);}
    .recent h3{font-size:14px;color:var(--muted);margin-bottom:12px;}
    .recent-list{display:flex;flex-direction:column;gap:8px;}
    .recent-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;background:#f8fafc;border-radius:8px;font-size:14px;}
    .recent-item code{font-weight:600;color:var(--primary);letter-spacing:1px;}
    .recent-item .mini-copy{font-size:12px;padding:6px 12px;}
    .loading{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .config-status{font-size:12px;color:var(--muted);margin-left:8px;}
    .config-status.ok{color:#2e7d32;}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;z-index:100;animation:fadeOut 2.5s ease forwards;pointer-events:none;}
    @keyframes fadeOut{0%,60%{opacity:1}100%{opacity:0}}
    .send-hint{font-size:12px;color:var(--muted);background:rgba(27,99,240,0.06);padding:8px 12px;border-radius:8px;margin-top:12px;}
    .login-box{max-width:360px;margin:40px auto;background:#fff;border-radius:14px;padding:32px;box-shadow:0 4px 20px rgba(0,0,0,0.08);border:1px solid rgba(0,0,0,0.04);}
    .login-box h2{font-size:18px;margin-bottom:20px;text-align:center;}
    .login-box .field{margin-bottom:16px;}
    .login-err{color:#c62828;font-size:13px;margin-top:8px;display:none;}
    .login-err.show{display:block;}
    .logout-btn{font-size:13px;color:var(--muted);cursor:pointer;}
    .logout-btn:hover{color:var(--primary);}
    .eval-panel{background:#fff;border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,0.08);border:1px solid rgba(0,0,0,0.04);margin-bottom:24px;overflow:hidden;}
    .eval-panel-head{padding:16px 24px;background:linear-gradient(135deg,rgba(27,99,240,0.06),rgba(255,138,0,0.05));border-bottom:1px solid var(--border);font-weight:600;font-size:15px;color:var(--text);}
    .eval-panel-body{padding:24px;}
    .eval-actions{display:grid;gap:20px;}
    .eval-action-row{display:flex;flex-wrap:wrap;align-items:center;gap:12px;}
    .eval-action-row label{margin-bottom:0;min-width:80px;}
    .eval-action-row input[type="number"]{max-width:72px;}
    .eval-action-row input[type="text"]{flex:1;min-width:180px;}
    .out-list-wrap{background:linear-gradient(135deg,rgba(27,99,240,0.05),rgba(255,138,0,0.04));border:1px solid rgba(27,99,240,0.15);border-radius:var(--radius);padding:20px;}
    .out-list-wrap .out-code{font-size:18px;}
    #outWrap.show{display:block !important;}
  </style>
</head>
<body>
  <div id="loginBox" class="login-box" style="display:none;">
    <h2>后台登录</h2>
    <div class="field">
      <label>账号</label>
      <input type="text" id="loginUser" placeholder="内部账号" autocomplete="username" />
    </div>
    <div class="field">
      <label>密码</label>
      <input type="password" id="loginPwd" placeholder="内部密码" autocomplete="current-password" />
    </div>
    <button type="button" id="loginBtn" class="btn-block">登录</button>
    <p class="login-err" id="loginErr"></p>
  </div>
  <div id="workbench" style="display:none;">
  <div class="header">
    <div class="brand">湘泰出海 · 客服工作台</div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <a href="index.html#evaluate" id="evalLink">→ 前往评估方案页</a>
      <button type="button" class="btn-copy" id="copyEvalLinkBtn" style="padding:6px 12px;font-size:13px;">复制评估页链接</button>
      <span class="logout-btn" id="logoutBtn">退出登录</span>
    </div>
  </div>
  <div class="box" style="max-width:560px;">
    <h1>评估码管理</h1>
    <p class="sub">在下方生成或手动添加评估码，复制发给客户；客户在主站「方案评估」输入对应评估码即可进入评估表。一码一次，复制后本页自动清空。</p>

    <div class="eval-panel">
      <div class="eval-panel-head">生成与添加</div>
      <div class="eval-panel-body eval-actions">
        <div class="eval-action-row">
          <label>一键生成</label>
          <input type="number" id="count" min="1" max="10" value="1" />
          <span style="font-size:13px;color:var(--muted);">个</span>
          <button type="button" id="btn" class="btn-copy">一键生成</button>
        </div>
        <div class="eval-action-row">
          <label>手动添加</label>
          <input type="text" id="manualCode" placeholder="XT+日期+6位，如 XT20250228ABC123" maxlength="20" />
          <button type="button" id="addManualBtn" class="btn-copy">添加</button>
        </div>
      </div>
      <div class="err" id="err" style="margin:0 24px 16px;"></div>
    </div>

    <div class="eval-panel out-list-wrap" id="outWrap" style="display:none;">
      <div class="eval-panel-head">本次已生成（复制后自动清空）</div>
      <div class="eval-panel-body">
        <div class="out-code" id="outCode" style="margin-bottom:14px;"></div>
        <div class="out-actions" style="display:flex;gap:10px;flex-wrap:wrap;">
          <button type="button" id="copyBtn" class="btn-copy">复制全部</button>
          <button type="button" id="copyLinkAndCodesBtn" class="btn-copy" style="background:linear-gradient(135deg,#2e7d32,#1b5e20);">复制链接+全部码（发给客户）</button>
        </div>
        <div class="recent" id="recentSection" style="display:none;margin-top:20px;padding-top:20px;border-top:1px solid var(--border);">
          <h3 style="font-size:13px;color:var(--muted);margin-bottom:10px;">单条复制</h3>
          <div class="recent-list" id="recentList"></div>
        </div>
      </div>
    </div>
    <p class="hint" style="margin-top:8px;">格式：XT+日期(8位)+6位字符。无插件、本地校验，复制成功后面板自动清空。</p>
  </div>
  </div>
  <div id="toast"></div>
  <script src="eval-pass.js"></script>
  <script>
    (function(){
      var LOGIN_KEY = 'xiangtai_admin_logged_in';
      var loginBox = document.getElementById('loginBox');
      var workbench = document.getElementById('workbench');
      var pass = window.XiangtaiEvalPass;
      function showView(){
        var ok = sessionStorage.getItem(LOGIN_KEY) === '1';
        loginBox.style.display = ok ? 'none' : 'block';
        workbench.style.display = ok ? 'block' : 'none';
      }
      showView();
      document.getElementById('loginBtn').onclick = function(){
        var user = (document.getElementById('loginUser').value || '').trim();
        var pwd = (document.getElementById('loginPwd').value || '').trim();
        var errEl = document.getElementById('loginErr');
        var u = (pass && pass.ADMIN_USER) ? pass.ADMIN_USER : 'admin';
        var p = (pass && pass.ADMIN_PASS) ? pass.ADMIN_PASS : 'Xiangtai2024';
        if (user === u && pwd === p) {
          sessionStorage.setItem(LOGIN_KEY, '1');
          errEl.classList.remove('show');
          showView();
        } else {
          errEl.textContent = '账号或密码错误';
          errEl.classList.add('show');
        }
      };
      document.getElementById('logoutBtn').onclick = function(){ sessionStorage.removeItem(LOGIN_KEY); showView(); };

      var countEl = document.getElementById('count');
      var outWrap = document.getElementById('outWrap');
      var outCode = document.getElementById('outCode');
      var errEl = document.getElementById('err');
      var recentSection = document.getElementById('recentSection');
      var recentList = document.getElementById('recentList');
      var recentCodes = [];
      function setErr(msg){ errEl.textContent = msg || ''; errEl.classList.toggle('show', !!msg); }
      function clearGeneratedCodes(){
        outWrap.classList.remove('show');
        outCode.textContent = '';
        recentSection.style.display = 'none';
        recentList.innerHTML = '';
        recentCodes = [];
      }
      function setOut(codes){
        if (!codes || !codes.length) return;
        recentCodes = codes;
        outCode.textContent = codes.join('    ');
        outWrap.classList.add('show');
        recentSection.style.display = 'block';
        recentList.innerHTML = codes.map(function(c){
          return '<div class="recent-item"><code>' + c + '</code><button type="button" class="mini-copy btn-copy" data-code="' + c + '">复制</button></div>';
        }).join('');
        recentList.querySelectorAll('.mini-copy').forEach(function(btn){
          btn.onclick = function(){ copyToClipboard(btn.dataset.code, clearGeneratedCodes); };
        });
        document.getElementById('copyBtn').onclick = function(){ copyToClipboard(outCode.textContent.replace(/\s+/g, '\n').trim(), clearGeneratedCodes); };
      }
      function showToast(msg){
        var el = document.getElementById('toast');
        el.textContent = msg; el.className = 'toast'; el.style.display = 'block';
        clearTimeout(showToast._t);
        showToast._t = setTimeout(function(){ el.style.display = 'none'; }, 2200);
      }
      function copyToClipboard(str, onSuccess){
        if (!str) return;
        function done(){ showToast('已复制到剪贴板'); if (typeof onSuccess === 'function') onSuccess(); }
        if (navigator.clipboard && navigator.clipboard.writeText)
          navigator.clipboard.writeText(str).then(done).catch(function(){ fallbackCopy(str, onSuccess); });
        else fallbackCopy(str, onSuccess);
      }
      function fallbackCopy(str, onSuccess){
        var ta = document.createElement('textarea'); ta.value = str; ta.style.position = 'fixed'; ta.style.opacity = '0'; document.body.appendChild(ta); ta.select();
        try {
          document.execCommand('copy');
          showToast('已复制到剪贴板');
          if (typeof onSuccess === 'function') onSuccess();
        } catch(e) { showToast('请手动复制'); }
        document.body.removeChild(ta);
      }
      function getEvalPageUrl(){
        var a = document.getElementById('evalLink');
        return (a && a.href) ? a.href : (window.location.origin + window.location.pathname.replace(/[^/]+$/, '') + 'index.html#evaluate');
      }
      document.getElementById('btn').onclick = function(){
        setErr('');
        if (!pass || !pass.generate) { setErr('未加载通行证脚本'); return; }
        var n = Math.min(10, Math.max(1, parseInt(countEl.value, 10) || 1));
        var list = [];
        for (var i = 0; i < n; i++) list.push(pass.generate());
        setOut(list);
      };
      document.getElementById('addManualBtn').onclick = function(){
        setErr('');
        var raw = (document.getElementById('manualCode').value || '').trim().toUpperCase();
        if (!raw) { setErr('请输入评估码'); return; }
        if (!pass || !pass.verify(raw)) { setErr('格式不正确，应为 XT+日期+6位字符（如 XT20250228ABC123）'); return; }
        document.getElementById('manualCode').value = '';
        if (recentCodes.indexOf(raw) !== -1) { setErr('该码已在列表中'); return; }
        setOut(recentCodes.concat([raw]));
      };
      document.getElementById('copyBtn').onclick = function(){
        copyToClipboard(outCode.textContent.replace(/\s+/g, '\n').trim(), clearGeneratedCodes);
      };
      document.getElementById('copyLinkAndCodesBtn').onclick = function(){
        var codes = outCode.textContent.replace(/\s+/g, '\n').trim();
        copyToClipboard(getEvalPageUrl() + '\n\n请用以上链接打开评估方案页，输入下方通行证（一码一次）：\n\n' + codes, clearGeneratedCodes);
      };
      document.getElementById('copyEvalLinkBtn').onclick = function(){ copyToClipboard(getEvalPageUrl()); };
      countEl.addEventListener('keydown', function(e){ if (e.key === 'Enter') { e.preventDefault(); document.getElementById('btn').click(); } });
    })();
  </script>
</body>
</html>
