<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>登录 / 注册 - 湘泰出海</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: linear-gradient(135deg, #f0f4f8 0%, #e8f4fd 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #fff; border-radius: 16px; padding: 40px; max-width: 400px; width: 100%; box-shadow: 0 8px 32px rgba(27,99,240,0.12); }
    h1 { font-size: 22px; margin-bottom: 8px; color: #1a1a2e; }
    .sub { font-size: 13px; color: #666; margin-bottom: 24px; }
    .tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 1px solid #e0e0e0; }
    .tabs a { padding: 12px 20px; font-size: 14px; color: #666; text-decoration: none; border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .tabs a.active { color: #1b63f0; font-weight: 600; border-bottom-color: #1b63f0; }
    .form { display: none; }
    .form.active { display: block; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #333; }
    input { width: 100%; padding: 12px 14px; border: 1px solid #c5d3e0; border-radius: 10px; font-size: 14px; margin-bottom: 14px; }
    input:focus { outline: none; border-color: #1b63f0; box-shadow: 0 0 0 3px rgba(27,99,240,0.1); }
    button { width: 100%; padding: 14px; background: linear-gradient(135deg, #1b63f0, #0d47a1); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
    button:hover { opacity: 0.95; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { font-size: 13px; margin-top: 12px; padding: 10px; border-radius: 8px; display: none; }
    .msg.err { background: #ffebee; color: #c62828; display: block; }
    .msg.ok { background: #e8f5e9; color: #2e7d32; display: block; }
    .back { font-size: 14px; margin-top: 20px; }
    .back a { color: #1b63f0; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>湘泰出海</h1>
    <p class="sub">登录或注册账号</p>
    <div class="tabs">
      <a href="#" class="tab active" data-tab="login">登录</a>
      <a href="#" class="tab" data-tab="register">注册</a>
    </div>
    <form id="loginForm" class="form active">
      <label>邮箱</label>
      <input type="email" id="loginEmail" placeholder="your@email.com" required />
      <label>密码</label>
      <input type="password" id="loginPwd" placeholder="密码" required />
      <button type="submit">登录</button>
    </form>
    <form id="registerForm" class="form">
      <label>姓名</label>
      <input type="text" id="regName" placeholder="您的姓名" />
      <label>邮箱</label>
      <input type="email" id="regEmail" placeholder="your@email.com" required />
      <label>密码</label>
      <input type="password" id="regPwd" placeholder="至少 6 位" required minlength="6" />
      <button type="submit">注册（客户账号）</button>
    </form>
    <div id="msg" class="msg"></div>
    <p class="back"><a href="index.html">← 返回首页</a></p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    var SUPABASE_URL = '';
    var SUPABASE_ANON_KEY = '';
    if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
      document.getElementById('msg').textContent = '请配置 SUPABASE_URL 和 SUPABASE_ANON_KEY 后使用登录功能';
      document.getElementById('msg').className = 'msg err';
    } else {
      var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      document.querySelectorAll('.tab').forEach(function(t) {
        t.addEventListener('click', function(e) {
          e.preventDefault();
          document.querySelectorAll('.tab').forEach(function(x) { x.classList.remove('active'); });
          document.querySelectorAll('.form').forEach(function(x) { x.classList.remove('active'); });
          this.classList.add('active');
          document.getElementById(this.dataset.tab + 'Form').classList.add('active');
          document.getElementById('msg').style.display = 'none';
        });
      });
      document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var msg = document.getElementById('msg');
        msg.className = 'msg';
        supabase.auth.signInWithPassword({
          email: document.getElementById('loginEmail').value.trim(),
          password: document.getElementById('loginPwd').value
        }).then(function(r) {
          if (r.error) { msg.textContent = r.error.message || '登录失败'; msg.className = 'msg err'; return; }
          msg.textContent = '登录成功，正在跳转…'; msg.className = 'msg ok';
          setTimeout(function() { window.location.href = 'dashboard.html'; }, 800);
        }).catch(function() { msg.textContent = '登录失败'; msg.className = 'msg err'; });
      });
      document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var msg = document.getElementById('msg');
        msg.className = 'msg';
        supabase.auth.signUp({
          email: document.getElementById('regEmail').value.trim(),
          password: document.getElementById('regPwd').value,
          options: { data: { full_name: document.getElementById('regName').value.trim() } }
        }).then(function(r) {
          if (r.error) { msg.textContent = r.error.message || '注册失败'; msg.className = 'msg err'; return; }
          msg.textContent = '注册成功，请查收邮件确认（若需）或直接登录'; msg.className = 'msg ok';
          setTimeout(function() { document.querySelector('.tab[data-tab=login]').click(); }, 1500);
        }).catch(function() { msg.textContent = '注册失败'; msg.className = 'msg err'; });
      });
    }
  </script>
</body>
</html>
